# Engine configuration. Equivalent EDN can be added for Clojure consumers later.

[audio]
input_file = "test.wav"
# Internal processing sample rate. Lower = faster. 16 kHz captures up to ~7 kHz
# which covers the pitch band we care about (30 Hz – 4 kHz).
sample_rate = 16000

[cochlea]
# Gammatone filterbank spanning pitch + rhythm-relevant bands.
n_channels = 64
low_hz = 30.0
high_hz = 4000.0

[rhythm_grfnn]
# Slow oscillators covering musical tempos and sub-beat divisions.
# 0.5–10 Hz = 30–600 BPM equivalent range.
n_oscillators = 50
low_hz = 0.5
high_hz = 10.0
# Integration step (seconds). Must be small relative to fastest oscillator period.
dt = 0.002
# Hopf parameters. alpha closer to zero = closer to bifurcation = stronger
# resonance to weak inputs (onset trains are sparse).
alpha = -0.02
beta1 = -1.0
beta2 = -1.0
delta1 = 0.0
delta2 = 0.0
epsilon = 1.0
# Input coupling gain. Rhythm drive is a sparse onset signal so we push
# hard to get oscillators into their limit-cycle regime.
input_gain = 80.0

[rhythm_grfnn.hebbian]
# Attunement: weights between co-active rhythm oscillators strengthen over
# time, forming learned rhythmic attractors (familiar grooves). When enabled,
# the final W matrix is saved to output/<audio_stem>.weights.npz.
enabled = true
learn_rate = 0.5
weight_decay = 0.05

[rhythm_grfnn.delay]
# Strong anticipation: self-coupled delayed feedback lets the rhythm network
# phase-lead the driver. tau = delay in seconds (0 disables). A 100ms delay
# is roughly the feedback latency for hand-tapping experiments in the paper.
tau = 0.1
gain = 0.2

[rhythm_grfnn.noise]
# Small stochastic kicks per step. Keeps oscillators lively and breaks
# symmetry. Typical useful range: 0.001 – 0.05.
amp = 0.02
seed = 0

[motor_grfnn]
# Two-layer pulse network (Harding/Kim/Large 2025 Fig. 4): a second
# rhythm-scale GrFNN modeling motor-cortex prediction, bidirectionally
# coupled to the sensory rhythm layer. Sustains pulse activity across
# audio silences and reinforces the felt beat.
enabled = true
n_oscillators = 50
low_hz = 0.5
high_hz = 10.0
dt = 0.002
# Lightly damped (less than sensory's -0.02) so motor sustains activity
# across audio silences, but damped enough to avoid saturating at the
# integrator clamp under continuous drive.
alpha = -0.05
beta1 = -1.0
beta2 = -1.0
delta1 = 0.0
delta2 = 0.0
epsilon = 1.0
input_gain = 1.0
# Forward (sensory → motor): sensory.z on mastered material peaks
# nearer ~0.5 (not the 0.15 an earlier tuning assumed), so with the
# original forward_gain=0.3 motor sat at its Hopf limit cycle the
# entire track. Retuned 0.3 → 0.1 (2026-04-16) so motor breathes
# with the sensory drive rather than saturating.
# Backward (motor → sensory): very small so the feedback modulates
# rather than driving sensory into saturation.
forward_gain = 0.1
backward_gain = 0.03

[pitch_grfnn]
n_oscillators = 100
low_hz = 30.0
high_hz = 4000.0
dt = 0.0000625   # 16 kHz rate
alpha = -0.05
beta1 = -1.0
beta2 = -1.0
delta1 = 0.0
delta2 = 0.0
epsilon = 1.0
# Pitch input is a (dense) band-limited audio signal. With the FIR gammatone
# front-end normalized to |H(fc)|=1, a well-driven channel produces band
# amplitudes on the order of the source audio amplitude. 0.1 reaches healthy
# |z| without saturating on typical mastered material.
input_gain = 0.1

[pitch_grfnn.hebbian]
# Attunement: weights between co-active pitch oscillators reveal implied
# tonal hierarchy and harmonic context over time.
enabled = true
learn_rate = 0.2
weight_decay = 0.02

[pitch_grfnn.delay]
# Delay coupling on the pitch network is rarely useful musically — the
# timescales are too short. Left here for symmetry and experimentation.
tau = 0.0
gain = 0.0

[pitch_grfnn.noise]
amp = 0.01
seed = 1

[phantom]
# Threshold for "this oscillator is resonating from memory, not drive".
# Phantom activation = |z| > amp_thresh  AND  input_envelope < drive_thresh
amp_thresh = 0.1
drive_thresh = 0.02

[state_log]
# Downsample state snapshots to this rate for disk logging.
# Rhythm network naturally runs at ~500 Hz, but 60 Hz snapshots are plenty
# for both the viewer and downstream particle/synth consumers.
snapshot_hz = 60
# Cadence (Hz) for capturing Hebbian weight matrix snapshots over time.
# 0 disables history (only the final W is saved). 2–4 Hz is plenty for
# animating the learning evolution in the viewer.
w_snapshot_hz = 2
# Output directory for state files. Each audio file produces its own
# {audio_stem}.parquet here, so repeated runs don't overwrite each other.
output_dir = "output"

[osc]
enabled = true
host = "127.0.0.1"
port = 57120   # legacy single target; router binds here too
# Broadcast at snapshot_hz. Each layer emits /rhythm/z and /pitch/z as float arrays.
#
# Additional endpoints — engine fans every message out to all of them.
# UDP doesn't share ports across receivers, so router + live viewer +
# TouchDesigner each bind their own port and the engine sends to all.

# Live viewer. nd-view --live defaults to this port.
[[osc.endpoints]]
host = "127.0.0.1"
port = 57121

# Example third subscriber (TouchDesigner, Overtone, osc.js, etc.):
# [[osc.endpoints]]
# host = "127.0.0.1"
# port = 8000

# ── Router (nd-route) ────────────────────────────────────────────
# CV / MIDI / OSC router. Subscribes to /voice/* and /features/*
# OSC emitted by nd-run, applies per-channel scaling, dispatches
# to backends. Leave cv.enabled=false until an ES-9 (or other
# DC-coupled interface) is plugged in.

[router.cv]
# Class-compliant ES-9 shows up as a 14-channel CoreAudio output.
# Leave device=null to use the system default; set to the ES-9's
# name string to pin to it. sample_rate matches the ES-9 default.
enabled = false
# device = "ES-9"
channels = 14
sample_rate = 48000
block_size = 256

[router.midi]
# mido port name. Run `python -c 'import mido; print(mido.get_output_names())'`
# to list available ports. On macOS, enable IAC Driver in Audio MIDI
# Setup to expose a virtual port like "IAC Driver Bus 1".
enabled = false
port = "IAC Driver Bus 1"

[router.osc]
# The router listens on this port; nd-run's [osc] section above
# should point here (same default 57120). To run router + SuperCollider
# simultaneously, move one to 57121.
listen_host = "127.0.0.1"
listen_port = 57120

# Additional OSC endpoints that receive a copy of every incoming
# message. Useful for chaining TouchDesigner, Overtone, etc.
# [[router.osc.forward]]
# host = "127.0.0.1"
# port = 8000

# ── Routing table ────────────────────────────────────────────────
# source = OSC path emitted by nd-run (glob * allowed in one segment)
# output = "cv/<ch>" or "midi/cc/<num>" or "midi/clock"
# scale  = "1V_per_oct" | "sawtooth_0_5V" | "unit_0_5V" | "passthrough"

# Tonic as 1V/oct — drive an external quantizer to keep the modular
# in key with the room.
[[router.mapping]]
source = "/features/key"
output = "cv/0"
scale = "1V_per_oct"

# Consonance scalar → filter cutoff CV, for example.
[[router.mapping]]
source = "/features/consonance"
output = "cv/1"
scale = "unit_0_5V"

# First tracked voice's rhythm phase → sawtooth on CV 2.
# Voice 0 is the first persistent voice identity the engine found;
# id wraps, so a wildcard would be wider but less stable per channel.
[[router.mapping]]
source = "/voice/0/rhythm/phase"
output = "cv/2"
scale = "sawtooth_0_5V"

# Voice 0's motor phase — anticipatory beat prediction → CV 3.
[[router.mapping]]
source = "/voice/0/motor/phase"
output = "cv/3"
scale = "sawtooth_0_5V"

# Consonance scalar duplicated to MIDI CC 7 for devices without CV input.
[[router.mapping]]
source = "/features/consonance"
output = "midi/cc/7"
scale = "unit_0_5V"
