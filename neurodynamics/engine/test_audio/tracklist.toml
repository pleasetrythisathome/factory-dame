# Track corpus for voice-extraction validation. Each entry specifies
# a YouTube search query (resolved via yt-dlp ytsearch), excerpt range
# to keep, and expected voice-count bounds used by the test suite.
#
# To regenerate: `uv run python -m tests.rip_corpus`

[[track]]
slug = "four_tet_angel_echoes"
artist = "Four Tet"
title = "Angel Echoes"
query = "Four Tet Angel Echoes"
start_sec = 60
duration_sec = 90
expected_voices_min = 2
expected_voices_max = 8
notes = "Dense layered melodic textures — multiple simultaneous voices"

